<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hub | Grieche-CMS Stats & Fleet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0047AB; --bg: #f8fafc; --panel: rgba(255,255,255,0.8); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); background-image: radial-gradient(circle at 20% 30%, rgba(0,71,171,0.05) 0%, transparent 40%); min-height: 100vh; padding: 40px; }
        
        .master-panel {
            max-width: 1300px; margin: 0 auto;
            background: var(--panel); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.4); border-radius: 40px; padding: 60px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.03);
        }

        /* 📈 Stats Bar */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); display: flex; align-items: center; gap: 20px; }
        .stat-card i { font-size: 1.8rem; height: 60px; width: 60px; display: flex; align-items: center; justify-content: center; border-radius: 18px; color: var(--primary); background: rgba(0,71,171,0.05); }
        .stat-card div h3 { font-size: 1.5rem; font-weight: 800; color: #1e293b; }
        .stat-card div p { font-size: 0.8rem; color: #64748b; font-weight: 600; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; margin-top: 20px; }
        .header h1 { font-weight: 800; font-size: 2.2rem; color: var(--primary); }

        .lic-table { width: 100%; border-collapse: collapse; }
        .lic-table th { text-align: left; padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; color: #94a3b8; }
        .lic-table td { padding: 20px; border-bottom: 1px solid rgba(0,0,0,0.02); font-size: 0.95rem; }

        .key-badge { font-family: monospace; font-size: 0.95rem; color: #1e293b; background: rgba(0,0,0,0.05); padding: 5px 12px; border-radius: 10px; }
        .type-tag { font-weight: 800; font-size: 0.65rem; padding: 5px 14px; border-radius: 20px; color: white; background: #64748b; text-transform: uppercase; }
        .type-PREMIUM_PLUS { background: #ab47bc; }
        .type-BASIC { background: #3b82f6; }
        .type-FREE { background: #eab308; color: #422006; }

        .ping-active { color: #22c55e; font-weight: 800; animation: pulse 2s infinite; }
        .ping-idle { color: #94a3b8; }

        .btn { padding: 14px 28px; border-radius: 16px; border: none; cursor: pointer; font-weight: 800; transition: 0.3s; }
        .btn-add { background: var(--primary); color: white; box-shadow: 0 10px 30px rgba(0,71,171,0.2); }
        .btn-delete { background: none; color: #ef4444; font-size: 1.2rem; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Generic Admin Overlays */
        .editor-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.7); backdrop-filter: blur(15px); display: none; place-items: center; z-index: 2000; }
        .editor-box { background: white; width: 640px; padding: 50px; border-radius: 40px; box-shadow: 0 50px 150px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; }
        .input-styled { width: 100%; padding: 16px; border-radius: 14px; border: 1.5px solid #e2e8f0; background: #f8fafc; font-weight: 600; margin-bottom: 20px; }
        label { font-weight: 800; font-size: 0.8rem; color: #64748b; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <div class="master-panel">
        <div class="stats-bar" id="stats-container">
            <div class="stat-card"><i class="fas fa-key"></i><div><h3 id="stat-total">-</h3><p>Total Keys</p></div></div>
            <div class="stat-card"><i class="fas fa-signal"></i><div><h3 id="stat-active">-</h3><p>Online Hubs</p></div></div>
            <div class="stat-card"><i class="fas fa-clock"></i><div><h3 id="stat-expiring">-</h3><p>Expiring 30d</p></div></div>
            <div class="stat-card"><i class="fas fa-chart-line"></i><div><h3 id="stat-usage">-</h3><p>Total Requests</p></div></div>
        </div>

        <div class="header">
            <div>
                <h1>Restaurant Fleet</h1>
                <p style="opacity:0.6; font-weight:600;">Monitor live restaurant activity and management keys.</p>
            </div>
            <button class="btn btn-add" id="open-creator"><i class="fas fa-plus"></i> Add Restaurant</button>
        </div>

        <table class="lic-table">
            <thead>
                <tr>
                    <th>License Key</th>
                    <th>Customer Name</th>
                    <th>Tier</th>
                    <th>Last Activity</th>
                    <th>Requests</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="lic-body"></tbody>
        </table>
    </div>

    <!-- Modal for Creation -->
    <div class="editor-overlay" id="editor">
        <div class="editor-box">
            <h2 style="margin-bottom:30px; font-weight:800; font-size:2rem;">Add New Restaurant</h2>
            <form id="lic-form">
                <label>Key</label>
                <input type="text" name="license_key" class="input-styled" placeholder="GREEK-XXXX-2026" required>
                <div style="display:flex; gap:15px;">
                    <div style="flex:1;"><label>Tier</label>
                        <select name="type" class="input-styled">
                            <option value="FREE">FREE Trial (31d)</option>
                            <option value="BASIC">BASIC (Standard)</option>
                            <option value="PREMIUM_PLUS">PREMIUM PLUS</option>
                            <option value="ENTERPRISE">ENTERPRISE (Full)</option>
                        </select>
                    </div>
                    <div style="flex:1;"><label>Dish Limit</label>
                        <input type="number" name="max_dishes" class="input-styled" value="100">
                    </div>
                </div>
                <label>Restaurant/Owner</label>
                <input type="text" name="customer_name" class="input-styled" placeholder="Papadopoulos Tavern" required>
                
                <div style="display:flex; justify-content:space-between; margin-top:20px;">
                    <button type="button" class="btn" id="close-btn" style="background:#f1f5f9; color:#64748b;">Cancel</button>
                    <button type="submit" class="btn btn-add">Activate Restaurant</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = '/api/admin/licenses';
        const modal = document.getElementById('editor');
        const form = document.getElementById('lic-form');

        async function loadFleet() {
            const r = await fetch(API);
            const { licenses, stats } = await r.json();
            
            // Render Stats
            document.getElementById('stat-total').innerText = stats.total;
            document.getElementById('stat-active').innerText = stats.active;
            document.getElementById('stat-expiring').innerText = stats.expiring;
            document.getElementById('stat-usage').innerText = stats.total_usage || 0;

            const body = document.getElementById('lic-body');
            body.innerHTML = licenses.map(l => {
                const lastPing = l.last_validated ? new Date(l.last_validated).toLocaleTimeString() : 'Never';
                const isOnline = l.last_validated && (new Date() - new Date(l.last_validated) < 300000); // 5 mins
                
                return `
                    <tr>
                        <td><span class="key-badge">${l.license_key}</span></td>
                        <td><strong>${l.customer_name}</strong></td>
                        <td><span class="type-tag type-${l.type}">${l.type}</span></td>
                        <td><span class="${isOnline ? 'ping-active' : 'ping-idle'}">${isOnline ? 'ONLINE' : 'Idle'}</span><br><small style="color:#94a3b8; font-weight:700;">${lastPing}</small></td>
                        <td><i class="fas fa-sync" style="opacity:0.3; font-size:0.8rem;"></i> ${l.usage_count || 0}</td>
                        <td>
                            <button class="btn-delete" onclick="deleteKey('${l.license_key}')"><i class="fas fa-times-circle"></i></button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.deleteKey = async (key) => {
            if(!confirm(`Exterminate restaurant license [${key}]?`)) return;
            await fetch(`${API}/${key}`, { method: 'DELETE' });
            loadFleet();
        }

        document.getElementById('open-creator').onclick = () => modal.style.display = 'grid';
        document.getElementById('close-btn').onclick = () => modal.style.display = 'none';

        form.onsubmit = async (e) => {
            e.preventDefault();
            const fd = new FormData(form);
            const raw = Object.fromEntries(fd);
            
            const permissions = {
                menu_edit: true, orders_kitchen: true,
                reservations: ['PREMIUM_PLUS', 'ENTERPRISE', 'FREE'].includes(raw.type),
                custom_design: ['PREMIUM_PLUS', 'ENTERPRISE', 'FREE'].includes(raw.type)
            };

            const full = {
                ...raw, status: 'active', associated_domain: '*',
                expires_at: new Date(Date.now() + 365*24*60*60*1000).toISOString(),
                allowed_modules: permissions,
                limits: { max_dishes: parseInt(raw.max_dishes), max_tables: 50 },
                usage_count: 0
            };

            await fetch(API, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(full) });
            form.reset();
            modal.style.display = 'none';
            loadFleet();
        }

        // Refresh fleet Every 10 seconds
        loadFleet();
        setInterval(loadFleet, 10000);
    </script>
</body>
</html>
